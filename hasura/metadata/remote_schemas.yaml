# Hasura Remote Schemas: Cross-module GraphQL federation
# Connects ERP-AIOps Hasura to all 23 other module Hasura instances.
# Enables cross-module queries: e.g., join incidents with Finance transactions.

remote_schemas:
  - name: erp_ai_schema
    definition:
      url: "http://erp-ai-hasura:19101/v1/graphql"
      timeout_seconds: 30
      forward_client_headers: true
    permissions:
      - role: user
        definition:
          schema: ""
      - role: admin
        definition:
          schema: ""

