actions:
  - name: analyzeIncident
    definition:
      kind: synchronous
      handler: "{{AI_BRAIN_URL}}/analyze/incident"
      timeout: 30
      headers:
        - name: X-Tenant-ID
          value_from_env: X-Hasura-Tenant-Id
      request_transform:
        method: POST
        content_type: application/json
    permissions:
      - role: user
    comment: "Analyze an incident using AI to determine root cause and suggest actions"

  - name: triggerRemediation
    definition:
      kind: synchronous
      handler: "{{RUST_API_URL}}/api/v1/remediation/execute"
      timeout: 60
      headers:
        - name: X-Tenant-ID
          value_from_env: X-Hasura-Tenant-Id
      request_transform:
        method: POST
        content_type: application/json
    permissions:
      - role: user
    comment: "Trigger a remediation action for an incident"

  - name: forecastMetric
    definition:
      kind: synchronous
      handler: "{{AI_BRAIN_URL}}/forecast"
      timeout: 30
      headers:
        - name: X-Tenant-ID
          value_from_env: X-Hasura-Tenant-Id
      request_transform:
        method: POST
        content_type: application/json
    permissions:
      - role: user
    comment: "Forecast future metric values using AI"

  - name: correlateEvents
    definition:
      kind: synchronous
      handler: "{{AI_BRAIN_URL}}/correlate"
      timeout: 30
      headers:
        - name: X-Tenant-ID
          value_from_env: X-Hasura-Tenant-Id
      request_transform:
        method: POST
        content_type: application/json
    permissions:
      - role: user
    comment: "Correlate events to identify related groups"

  # ── AIOps Autonomous Operations Actions ──

  - name: moduleHealthCheck
    definition:
      kind: synchronous
      handler: "{{RUST_API_URL}}/api/v1/actions/module-health-check"
      timeout: 30
      headers:
        - name: X-Tenant-ID
          value_from_env: X-Hasura-Tenant-Id
      request_transform:
        method: POST
        content_type: application/json
    permissions:
      - role: user
      - role: admin
    comment: "Query module health status with optional live endpoint probing"

  - name: evaluateGuardrail
    definition:
      kind: synchronous
      handler: "{{RUST_API_URL}}/api/v1/actions/evaluate-guardrail"
      timeout: 30
      headers:
        - name: X-Tenant-ID
          value_from_env: X-Hasura-Tenant-Id
      request_transform:
        method: POST
        content_type: application/json
    permissions:
      - role: admin
    comment: "Evaluate an action against AIDD guardrail tiers and record the decision"

  - name: createMaintenanceWindow
    definition:
      kind: synchronous
      handler: "{{RUST_API_URL}}/api/v1/actions/create-maintenance-window"
      timeout: 30
      headers:
        - name: X-Tenant-ID
          value_from_env: X-Hasura-Tenant-Id
      request_transform:
        method: POST
        content_type: application/json
    permissions:
      - role: admin
    comment: "Create a maintenance window to suppress alerts and remediation"

  - name: executeRunbook
    definition:
      kind: asynchronous
      handler: "{{RUST_API_URL}}/api/v1/actions/execute-runbook"
      timeout: 120
      headers:
        - name: X-Tenant-ID
          value_from_env: X-Hasura-Tenant-Id
      request_transform:
        method: POST
        content_type: application/json
    permissions:
      - role: admin
    comment: "Execute a runbook with guardrail evaluation and rollback on failure"

  - name: getSLOStatus
    definition:
      kind: synchronous
      handler: "{{RUST_API_URL}}/api/v1/actions/slo-status"
      timeout: 30
      headers:
        - name: X-Tenant-ID
          value_from_env: X-Hasura-Tenant-Id
      request_transform:
        method: POST
        content_type: application/json
    permissions:
      - role: user
      - role: admin
    comment: "Query SLO tracking data with burn rate computation"

custom_types:
  input_objects:
    - name: AnalyzeIncidentInput
      fields:
        - name: incident_id
          type: uuid!
        - name: title
          type: String!
        - name: description
          type: String
        - name: severity
          type: String
        - name: affected_services
          type: "[String]"

    - name: TriggerRemediationInput
      fields:
        - name: incident_id
          type: uuid
        - name: action_type
          type: String!
        - name: target_service
          type: String!
        - name: parameters
          type: jsonb

    - name: ForecastMetricInput
      fields:
        - name: metric_name
          type: String!
        - name: service
          type: String!
        - name: horizon_hours
          type: Int

    - name: CorrelateEventsInput
      fields:
        - name: events
          type: "[jsonb!]!"
        - name: time_window_secs
          type: Int

    # ── AIOps Autonomous Operations Inputs ──

    - name: ModuleHealthCheckInput
      fields:
        - name: module_name
          type: String
        - name: probe_live
          type: Boolean

    - name: EvaluateGuardrailInput
      fields:
        - name: action_type
          type: String!
        - name: target_module
          type: String
        - name: risk_score
          type: Int
        - name: requested_by
          type: String!
        - name: reason
          type: String

    - name: CreateMaintenanceWindowInput
      fields:
        - name: name
          type: String!
        - name: description
          type: String
        - name: target_modules
          type: "[String]"
        - name: start_time
          type: timestamptz!
        - name: end_time
          type: timestamptz!
        - name: suppress_alerts
          type: Boolean
        - name: suppress_remediation
          type: Boolean

    - name: ExecuteRunbookInput
      fields:
        - name: runbook_id
          type: uuid!
        - name: target_module
          type: String
        - name: parameters
          type: jsonb

    - name: GetSLOStatusInput
      fields:
        - name: module_name
          type: String
        - name: slo_name
          type: String

  objects:
    - name: AnalyzeIncidentOutput
      fields:
        - name: incident_id
          type: uuid!
        - name: root_cause
          type: String
        - name: confidence
          type: Float!
        - name: impact_assessment
          type: String!

    - name: RemediationOutput
      fields:
        - name: id
          type: uuid!
        - name: status
          type: String!

    - name: ForecastOutput
      fields:
        - name: metric_name
          type: String!
        - name: anomaly_probability
          type: Float!

    - name: CorrelationOutput
      fields:
        - name: total_events
          type: Int!
        - name: correlated_events
          type: Int!
        - name: correlation_rate
          type: Float!

    # ── AIOps Autonomous Operations Outputs ──

    - name: ModuleHealthCheckOutput
      fields:
        - name: module_name
          type: String!
        - name: status
          type: String!
        - name: latency_ms
          type: Float
        - name: error_rate
          type: Float
        - name: pod_count
          type: Int
        - name: last_heartbeat_at
          type: String

    - name: EvaluateGuardrailOutput
      fields:
        - name: id
          type: uuid!
        - name: tier
          type: String!
        - name: result
          type: String!
        - name: approval_chain
          type: jsonb
        - name: reason
          type: String

    - name: CreateMaintenanceWindowOutput
      fields:
        - name: id
          type: uuid!
        - name: name
          type: String!
        - name: status
          type: String!
        - name: start_time
          type: String!
        - name: end_time
          type: String!

    - name: ExecuteRunbookOutput
      fields:
        - name: execution_id
          type: uuid!
        - name: runbook_id
          type: uuid!
        - name: status
          type: String!
        - name: steps_completed
          type: Int

    - name: SLOStatusOutput
      fields:
        - name: module_name
          type: String!
        - name: slo_name
          type: String!
        - name: slo_type
          type: String!
        - name: target
          type: Float!
        - name: current_value
          type: Float
        - name: error_budget_remaining
          type: Float
        - name: status
          type: String!
        - name: burn_rate
          type: Float
