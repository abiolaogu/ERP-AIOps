          permission:
            columns: "*"
            filter:
              tenant_id:
                _eq: X-Hasura-Tenant-Id

    - table:
        schema: public
        name: security_findings
      select_permissions:
        - role: user
          permission:
            columns: "*"
            filter:
              tenant_id:
                _eq: X-Hasura-Tenant-Id
      update_permissions:
        - role: user
          permission:
            columns: "*"
            filter:
              tenant_id:
                _eq: X-Hasura-Tenant-Id

    # ── AIOps Autonomous Operations Tables ──

    - table:
        schema: public
        name: module_health_status
      select_permissions:
        - role: user
          permission:
            columns: "*"
            filter:
              tenant_id:
                _eq: X-Hasura-Tenant-Id
        - role: admin
          permission:
            columns: "*"
            filter: {}
      insert_permissions:
        - role: user
          permission:
            columns: "*"
            check:
              tenant_id:
                _eq: X-Hasura-Tenant-Id
        - role: admin
          permission:
            columns: "*"
            check: {}
      update_permissions:
        - role: user
          permission:
            columns: "*"
            filter:
              tenant_id:
                _eq: X-Hasura-Tenant-Id
        - role: admin
          permission:
            columns: "*"
            filter: {}
      delete_permissions:
        - role: admin
          permission:
            filter: {}
      event_triggers:
        - name: health_status_changed
          definition:
            enable_manual: false
            update:
              columns:
                - status
          retry_conf:
            num_retries: 3
            interval_sec: 10
          webhook: "{{RUST_API_URL}}/api/v1/webhooks/health-status-changed"

