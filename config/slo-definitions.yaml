# Standard SLO Definitions for all ERP modules
# Each SLO has a Prometheus query template parameterized by ${module}

slo_definitions:
  - name: availability
    type: availability
    description: "Service availability measured by successful request ratio"
    target: 99.9
    window_days: 30
    prometheus_query: |
      1 - (
        sum(rate(http_requests_total{job="erp-gateways", erp_module="${module}", code=~"5.."}[5m]))
        /
        sum(rate(http_requests_total{job="erp-gateways", erp_module="${module}"}[5m]))
      )
    error_budget_formula: "(1 - target/100) * window_minutes"
    unit: "percentage"

  - name: latency_p95
    type: latency
    description: "95th percentile request latency"
    target: 2000
    window_days: 30
    prometheus_query: |
      histogram_quantile(0.95,
        sum by (le) (rate(http_request_duration_seconds_bucket{job="erp-gateways", erp_module="${module}"}[5m]))
      ) * 1000
    unit: "milliseconds"

  - name: error_rate
    type: error_rate
    description: "HTTP 5xx error rate"
    target: 0.1
    window_days: 30
    prometheus_query: |
      100 * (
        sum(rate(http_requests_total{job="erp-gateways", erp_module="${module}", code=~"5.."}[5m]))
        /
        sum(rate(http_requests_total{job="erp-gateways", erp_module="${module}"}[5m]))
      )
    unit: "percentage"

  - name: throughput
    type: throughput
    description: "Minimum sustained request throughput"
    target: 10
    window_days: 30
    prometheus_query: |
      sum(rate(http_requests_total{job="erp-gateways", erp_module="${module}"}[5m]))
    unit: "requests_per_second"

modules:
  - ai
  - aiops
  - assistant
  - autonomous-coding
  - bi
  - bss-oss
  - crm
  - church-management
  - commerce
  - dbaas
  - finance
  - hcm
  - healthcare
  - iam
  - marketing
  - observability
  - platform
  - projects
  - scm
  - school-management
  - web-hosting
  - workspace
  - ecommerce
  - ipaas
