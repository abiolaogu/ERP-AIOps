rules:
  - name: high-cpu-usage
    type: threshold
    condition:
      metric: cpu_usage_percent
      operator: gt
      value: 90
      duration: 5m
    action:
      type: alert
      severity: warning
      message: "CPU usage exceeds 90% for 5 minutes"

  - name: critical-cpu-usage
    type: threshold
    condition:
      metric: cpu_usage_percent
      operator: gt
      value: 98
      duration: 2m
    action:
      type: remediate
      severity: critical
      remediation: scale-horizontal
      message: "CPU usage exceeds 98% - auto-scaling triggered"

  - name: memory-leak-detection
    type: anomaly
    condition:
      metric: memory_usage_bytes
      method: linear-regression
      trend: increasing
      duration: 1h
    action:
      type: alert
      severity: high
      message: "Potential memory leak detected - monotonic increase over 1 hour"

  - name: disk-space-forecast
    type: forecast
    condition:
      metric: disk_usage_percent
      forecast_horizon: 48h
      breach_threshold: 95
    action:
      type: alert
      severity: warning
      message: "Disk space predicted to exceed 95% within 48 hours"

  - name: error-rate-spike
    type: anomaly
    condition:
      metric: http_error_rate
      method: z-score
      threshold: 3.0
    action:
      type: escalate
      severity: high
      message: "Error rate spike detected - {score} standard deviations above normal"

  - name: latency-degradation
    type: threshold
    condition:
      metric: http_request_duration_p99
      operator: gt
      value: 5000
      duration: 3m
    action:
      type: alert
      severity: warning
      message: "P99 latency exceeds 5 seconds for 3 minutes"

  - name: service-cascade-failure
    type: correlation
    condition:
      event_types: [service_down, error_spike, timeout_increase]
      min_events: 3
      time_window: 5m
    action:
      type: escalate
      severity: critical
      message: "Cascade failure detected across multiple services"

  - name: pod-crash-loop
    type: threshold
    condition:
      metric: kube_pod_container_status_restarts_total
      operator: gt
      value: 5
      duration: 10m
    action:
      type: remediate
      severity: high
      remediation: rollback-deployment
      message: "Pod crash loop detected - initiating rollback"
