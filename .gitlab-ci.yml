stages:
  - prepare
  - lint
  - build
  - deploy
  - smoke

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  RUSTUP_HOME: "$CI_PROJECT_DIR/.rustup"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip"
  GOPATH: "$CI_PROJECT_DIR/.go"

cache:
  paths:
    - .cargo/
    - target/
    - .pip/
    - .go/
    - web/node_modules/

# --------------- PREPARE ---------------

prepare:deps:
  stage: prepare
  script:
    - cd web && npm ci
    - cd services/ai-brain && pip install -r requirements.txt

# --------------- LINT ---------------

lint:go:
  stage: lint
  script:
    - cd cmd/server && go vet ./...
    - golangci-lint run ./...

lint:rust:
  stage: lint
  script:
    - cargo clippy --workspace -- -D warnings
    - cargo fmt --all -- --check

lint:python:
  stage: lint
  script:
    - cd services/ai-brain && ruff check . && ruff format --check .

lint:frontend:
  stage: lint
  script:
    - cd web && npm run lint && npm run typecheck

# --------------- BUILD ---------------

build:gateway:
  stage: build
  script:
    - cd cmd/server && go build -o ../../bin/aiops-gateway .
  artifacts:
    paths:
      - bin/aiops-gateway

build:rust-api:
  stage: build
  script:
    - cargo build --release -p opstrac-api
  artifacts:
    paths:
      - target/release/opstrac-api

build:ai-brain:
  stage: build
  script:
    - cd services/ai-brain && python -m py_compile app/main.py

build:frontend:
  stage: build
  script:
    - cd web && npm run build
  artifacts:
    paths:
      - web/dist/

build:docker:
  stage: build
  script:
    - cd infra && docker compose build

# --------------- DEPLOY ---------------

deploy:staging:
  stage: deploy
  environment:
    name: staging
  script:
    - echo "Deploying ERP-AIOps to staging..."
    - helm upgrade --install erp-aiops charts/erp-aiops -f charts/erp-aiops/values-staging.yaml
  only:
    - develop

deploy:production:
  stage: deploy
  environment:
    name: production
  script:
    - echo "Deploying ERP-AIOps to production..."
    - helm upgrade --install erp-aiops charts/erp-aiops -f charts/erp-aiops/values-production.yaml
  only:
    - main
  when: manual

# --------------- SMOKE ---------------

smoke:test:
  stage: smoke
  script:
    - ./scripts/smoke.sh
  only:
    - develop
    - main
