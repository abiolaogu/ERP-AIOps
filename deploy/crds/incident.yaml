apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: incidents.aiops.erp.io
spec:
  group: aiops.erp.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                title:
                  type: string
                severity:
                  type: string
                  enum: [critical, high, medium, low, info]
                source:
                  type: string
                description:
                  type: string
                affectedComponents:
                  type: array
                  items:
                    type: string
                tenantId:
                  type: string
                assignee:
                  type: string
                autoRemediate:
                  type: boolean
                  default: false
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [detected, investigating, mitigating, resolved, closed]
                rootCause:
                  type: string
                resolution:
                  type: string
                startedAt:
                  type: string
                  format: date-time
                resolvedAt:
                  type: string
                  format: date-time
  scope: Namespaced
  names:
    plural: incidents
    singular: incident
    kind: Incident
    shortNames:
      - inc
