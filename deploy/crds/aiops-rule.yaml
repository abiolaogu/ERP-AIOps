apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: aiopsrules.aiops.erp.io
spec:
  group: aiops.erp.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                ruleType:
                  type: string
                  enum: [anomaly, threshold, correlation, remediation]
                condition:
                  type: object
                  properties:
                    metric:
                      type: string
                    operator:
                      type: string
                      enum: [gt, lt, eq, gte, lte]
                    value:
                      type: number
                    duration:
                      type: string
                action:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [alert, remediate, escalate, suppress]
                    target:
                      type: string
                    parameters:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                tenantId:
                  type: string
                enabled:
                  type: boolean
                  default: true
            status:
              type: object
              properties:
                state:
                  type: string
                lastEvaluated:
                  type: string
                  format: date-time
                matchCount:
                  type: integer
  scope: Namespaced
  names:
    plural: aiopsrules
    singular: aiopsrule
    kind: AIOpsRule
    shortNames:
      - aior
