replicaCount: 1

gateway:
  image:
    repository: erp-aiops-gateway
    tag: latest
  port: 8090
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

api:
  image:
    repository: erp-aiops-api
    tag: latest
  port: 8080
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

aiBrain:
  image:
    repository: erp-aiops-ai-brain
    tag: latest
  port: 8001
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

yugabytedb:
  enabled: true

dragonfly:
  enabled: true

ingress:
  enabled: false
  className: nginx
  host: aiops.erp.local

serviceAccount:
  create: true
  name: erp-aiops
