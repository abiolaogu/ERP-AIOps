version: '3.9'
services:
  aiops-gateway:
    build:
      context: .
      dockerfile: infra/Dockerfile.gateway
    environment:
      PORT: '8090'
      MODULE_NAME: ERP-AIOps
      RUST_API_URL: http://rust-api:8080
      AI_BRAIN_URL: http://ai-brain:8001
      CORS_ORIGINS: http://localhost:5179,http://localhost:3000
      ERP_SHARED_HASURA_URL: ${ERP_SHARED_HASURA_URL:-http://localhost:8090/v1/graphql}
      ERP_SHARED_IAM_URL: ${ERP_SHARED_IAM_URL:-http://localhost:8081}
      ERP_SHARED_OTLP_ENDPOINT: ${ERP_SHARED_OTLP_ENDPOINT:-http://localhost:4317}
    ports:
    - 8090:8090
    depends_on:
      rust-api:
        condition: service_healthy
      ai-brain:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - wget
      - -qO-
      - http://localhost:8090/healthz
      interval: 20s
      timeout: 3s
      retries: 3
  rust-api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    environment:
      RUST_API_PORT: '8080'
      RUST_LOG: info,opstrac=debug
      DATABASE_URL: ${ERP_SHARED_DB_URL:-postgres://erp_admin:changeme_in_production@localhost:5432/erp_shared?sslmode=disable}
      REDIS_URL: redis://dragonfly:6379
      ERP_SHARED_HASURA_URL: ${ERP_SHARED_HASURA_URL:-http://localhost:8090/v1/graphql}
      ERP_SHARED_IAM_URL: ${ERP_SHARED_IAM_URL:-http://localhost:8081}
      ERP_SHARED_OTLP_ENDPOINT: ${ERP_SHARED_OTLP_ENDPOINT:-http://localhost:4317}
    ports:
    - 8080:8080
    depends_on:
      dragonfly:
        condition: service_started
    healthcheck:
      test:
      - CMD
      - wget
      - -qO-
      - http://localhost:8080/healthz
      interval: 20s
      timeout: 5s
      retries: 3
  ai-brain:
    build:
      context: ./services/ai-brain
      dockerfile: Dockerfile
    environment:
      PORT: '8001'
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      DATABASE_URL: ${ERP_SHARED_DB_URL:-postgres://erp_admin:changeme_in_production@localhost:5432/erp_shared?sslmode=disable}
      ERP_SHARED_HASURA_URL: ${ERP_SHARED_HASURA_URL:-http://localhost:8090/v1/graphql}
      ERP_SHARED_IAM_URL: ${ERP_SHARED_IAM_URL:-http://localhost:8081}
      ERP_SHARED_OTLP_ENDPOINT: ${ERP_SHARED_OTLP_ENDPOINT:-http://localhost:4317}
    ports:
    - 8001:8001
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8001/health
      interval: 20s
      timeout: 5s
      retries: 3
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    ports:
    - 6379:6379
    volumes:
    - dragonfly-data:/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
volumes:
  dragonfly-data: null
x-shared-infra:
  hasura_graphql_url: ${ERP_SHARED_HASURA_URL:-http://localhost:8090/v1/graphql}
  postgres_url: ${ERP_SHARED_DB_URL:-postgres://erp_admin:changeme_in_production@localhost:5432/erp_shared?sslmode=disable}
  iam_url: ${ERP_SHARED_IAM_URL:-http://localhost:8081}
  otlp_endpoint: ${ERP_SHARED_OTLP_ENDPOINT:-http://localhost:4317}
